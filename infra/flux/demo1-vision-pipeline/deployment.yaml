apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-pipeline
  namespace: geoint-vision
  labels:
    app: vision-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-pipeline
  template:
    metadata:
      labels:
        app: vision-pipeline
    spec:
      # Schedule on GPU node for hardware-accelerated Ollama + YOLO inference
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values: ["true"]
      imagePullSecrets:
        - name: acr-secret
      containers:
        # Ollama — GPU-accelerated LLM inference
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              cpu: "500m"
              memory: "4Gi"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama

        # YOLOv8 satellite object detection
        - name: yolov8-detector
          image: acrgeointdemo.azurecr.io/geoint/yolov8-satellite:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"

        # FastAPI backend
        - name: api-backend
          image: acrgeointdemo.azurecr.io/geoint/vision-api:latest
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
          env:
            - name: FOUNDRY_URL
              value: "http://localhost:11434"
            - name: YOLO_URL
              value: "http://localhost:8000"
            - name: FOUNDRY_MODEL
              value: "phi3:mini"

        # React frontend
        - name: frontend
          image: acrgeointdemo.azurecr.io/geoint/vision-ui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

      volumes:
        - name: ollama-data
          emptyDir: {}
