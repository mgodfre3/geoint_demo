apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyst-assistant
  namespace: geoint-assistant
  labels:
    app: analyst-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyst-assistant
  template:
    metadata:
      labels:
        app: analyst-assistant
    spec:
      # Schedule on vipool — large node with CPU headroom for LLM inference
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: nvidia.com/gpu
                    operator: DoesNotExist
      imagePullSecrets:
        - name: acr-secret
      containers:
        # Ollama — CPU LLM inference (GPU reserved for Vision Pipeline)
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama

        # ChromaDB vector store
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma

        # RAG backend + Chat API
        - name: chat-backend
          image: acrgeointdemo.azurecr.io/geoint/chat-api:latest
          ports:
            - containerPort: 8087
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
          env:
            - name: FOUNDRY_URL
              value: "http://localhost:11434"
            - name: CHROMA_URL
              value: "http://localhost:8000"
            - name: VISION_API_URL
              value: "http://vision-pipeline.geoint-vision.svc:8082"
            - name: FOUNDRY_MODEL
              value: "phi3:mini"

      volumes:
        - name: ollama-data
          emptyDir: {}
        - name: chroma-data
          emptyDir: {}
