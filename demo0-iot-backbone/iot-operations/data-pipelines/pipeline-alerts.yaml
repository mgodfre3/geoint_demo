# Azure IoT Operations — Dataflow: Filtered anomaly alerts → MQTT topic
#
# Source      : MQTT topic geoint/sensors/+/+/alert (raw sensor alert events)
# Filter      : Forward only payloads where alert == true
# Destination : MQTT topic geoint/pipelines/alerts (consumed by alert-processor)
#
# Apply with: kubectl apply -f pipeline-alerts.yaml

apiVersion: connectivity.iotoperations.azure.com/v1
kind: Dataflow
metadata:
  name: sensor-alerts-to-processor
  namespace: azure-iot-operations
  labels:
    demo: geoint-iot-backbone
spec:
  profileRef: default
  mode: Enabled
  requestDiskPersistence: Disabled
  operations:
    - name: source-alerts
      operationType: Source
      sourceSettings:
        endpointRef: aio-default-broker
        dataSources:
          - geoint/sensors/+/+/alert
    - name: filter-alerts
      operationType: BuiltInTransformation
      builtInTransformationSettings:
        map:
          - inputs: ["*"]
            output: "*"
        filter:
          - inputs:
              - "$source.alert"
            expression: "$1 == true"
    - name: publish-alerts
      operationType: Destination
      destinationSettings:
        endpointRef: aio-default-broker
        dataDestination: geoint/pipelines/alerts
