# Azure IoT Operations — Dataflow: Sensor telemetry → flattened MQTT topic
#
# Source      : MQTT topic geoint/sensors/+/+/telemetry (all sensor payloads)
# Transform   : Flatten canonical payload into a PostGIS-friendly schema
# Destination : MQTT topic geoint/pipelines/sensor-telemetry (consumed by downstream ETL)
#
# Apply with: kubectl apply -f pipeline-sensors.yaml

apiVersion: connectivity.iotoperations.azure.com/v1
kind: Dataflow
metadata:
  name: sensor-telemetry-to-postgis
  namespace: azure-iot-operations
  labels:
    demo: geoint-iot-backbone
spec:
  profileRef: default
  mode: Enabled
  requestDiskPersistence: Disabled
  operations:
    - name: source-telemetry
      operationType: Source
      sourceSettings:
        endpointRef: aio-default-broker
        dataSources:
          - geoint/sensors/+/+/telemetry
    - name: flatten-payload
      operationType: BuiltInTransformation
      builtInTransformationSettings:
        map:
          - inputs: ["$source.sensor_id"]
            output: "sensor_id"
          - inputs: ["$source.sensor_type"]
            output: "sensor_type"
          - inputs: ["$source.grid_ref"]
            output: "grid_ref"
          - inputs: ["$source.lat"]
            output: "lat"
          - inputs: ["$source.lon"]
            output: "lon"
          - inputs: ["$source.timestamp"]
            output: "recorded_at"
          - inputs: ["$source.reading"]
            output: "reading_json"
          - inputs: ["$source.alert"]
            output: "is_alert"
    - name: publish-telemetry
      operationType: Destination
      destinationSettings:
        endpointRef: aio-default-broker
        dataDestination: geoint/pipelines/sensor-telemetry
