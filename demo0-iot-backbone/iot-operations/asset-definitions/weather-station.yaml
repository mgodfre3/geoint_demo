# Azure IoT Operations — Asset Definition: Weather Station
#
# Represents a simulated weather station sensor as an AIO Asset resource.
# The asset declares datasets whose datapoints map to MQTT topics published
# by the sensor simulator.
#
# Apply with: kubectl apply -f weather-station.yaml

apiVersion: deviceregistry.microsoft.com/v1
kind: Asset
metadata:
  name: weather-station-001
  namespace: azure-iot-operations
  labels:
    demo: geoint-iot-backbone
    sensor-type: weather-station
spec:
  displayName: "GEOINT Weather Station 001"
  description: "Simulated meteorological sensor providing temperature, humidity, wind speed, and barometric pressure data."
  assetEndpointProfileRef: azure-iot-operations/geoint-mqtt-endpoint
  manufacturer: "SimSensors Inc."
  manufacturerUri: "https://example.com/simsensors"
  model: "WX-3000"
  productCode: "WX3000-SIM"
  hardwareRevision: "1.0"
  softwareRevision: "2.4.1"
  serialNumber: "WX3000-001"
  documentationUri: "https://example.com/simsensors/wx3000/docs"
  defaultDatasetsConfiguration: '{"publishingInterval": 3000, "samplingInterval": 500, "queueSize": 4}'
  datasets:
    - name: telemetry
      topic:
        path: "geoint/sensors/weather-station/weather-001/telemetry"
        retain: Never
      dataPoints:
        - name: temperature_c
          dataSource: "$.reading.temperature_c"
          observabilityMode: Gauge
        - name: humidity_pct
          dataSource: "$.reading.humidity_pct"
          observabilityMode: Gauge
        - name: wind_speed_kph
          dataSource: "$.reading.wind_speed_kph"
          observabilityMode: Gauge
        - name: pressure_hpa
          dataSource: "$.reading.pressure_hpa"
          observabilityMode: Gauge
        - name: grid_ref
          dataSource: "$.grid_ref"
          observabilityMode: None
        - name: is_alert
          dataSource: "$.alert"
          observabilityMode: None
