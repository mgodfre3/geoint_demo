# Azure IoT Operations — MQTT Broker listener configuration
# Adds a demo-friendly NodePort listener to the default broker that Azure IoT
# Operations provisions with each Instance. This keeps the managed broker
# configuration intact while exposing a plain MQTT endpoint for edge workloads
# such as the sensor simulator.
#
#   - Service: aio-broker-nodeport
#   - Cluster port: 1883
#   - NodePort (patched in deploy script): defaults to 31883
#   - Authentication intentionally disabled (demo only)
#
# Namespace: azure-iot-operations
# Apply with: kubectl apply -f broker.yaml

---
# ── BrokerListener: non-TLS NodePort for demos ──────────────────
apiVersion: mqttbroker.iotoperations.azure.com/v1
kind: BrokerListener
metadata:
  name: geoint-listener-nodeport
  namespace: azure-iot-operations
  labels:
    demo: geoint-iot-backbone
spec:
  brokerRef: default
  serviceName: aio-broker-nodeport
  serviceType: NodePort
  ports:
    - port: 1883
      # NodePort value comes from MQTT_BROKER_NODEPORT in .env (default: 31883).
      # The deploy-iot-backbone.ps1 script patches this value before applying.
      nodePort: ${MQTT_BROKER_NODEPORT}
      protocol: Mqtt
