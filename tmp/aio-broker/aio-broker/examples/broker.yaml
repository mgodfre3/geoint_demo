                      code:
                        type: string
                      message:
                        type: string
                    required:
                    - code
                    - message
                    type: object
                  failureCause:
                    nullable: true
                    type: string
                  logErrors:
                    nullable: true
                    type: boolean
                  operationId:
                    type: string
                  output:
                    additionalProperties:
                      type: string
                    nullable: true
                    type: object
                  status:
                    type: string
                required:
                - operationId
                - status
                type: object
              runtime:
                description: Runtime status used for emitting runtime details.
                nullable: true
                properties:
                  output:
                    additionalProperties:
                      type: string
                    description: The output of the resource when the runtime.phase is not Failed. This is an open key-value pair dictionary and a component owner can have key-value string pairs of their choice.
                    nullable: true
                    type: object
                  phase:
                    description: Describe the current state phase of the Resource. This can be ideally any descriptive healthy string, but should have the following values for consistency – Running, Connected, Recovering, Waiting, Failed
                    enum:
