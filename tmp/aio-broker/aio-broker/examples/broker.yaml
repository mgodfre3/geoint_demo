                            code:
                              description: 'A unique identifier of the error across all the aio components that allows for i18n, with the following pattern: <status-code>.<category-error>.<component-id>.<unique-id>'
                              type: string
                            correlationId:
                              description: A correlation ID to map this specific error instance to an event.
                              type: string
                            info:
                              description: An extensive human-readable details for the error.
                              nullable: true
                              type: string
                            innerError:
                              additionalProperties:
                                type: string
                              description: A service-defined object containing additional debug info.
                              type: object
                            message:
                              description: A short, human-readable sentence that describe the error.
                              type: string
                          required:
                          - code
                          - correlationId
                          - innerError
                          - message
                          type: object
                        type: array
                      message:
                        description: A short, human-readable summary of the problem type.
                        type: string
                    required:
                    - code
                    - details
                    - message
                    type: object
                  lastTransitionTime:
                    description: '`LastTransitionTime` is the timestamp of the most recent transition in the format "2024-12-10T16:19:53Z".'
                    type: string
                  version:
                    description: Version is iterated every time the `ConfigStatus` is updated starting from 1.
                    format: uint32
                    minimum: 0.0
                    type: integer
                required:
                - lastTransitionTime
                - version
                type: object
              healthState:
                description: Health state of the resource after provisioning has completed.
                nullable: true
                properties:
                  lastUpdateTime:
                    nullable: true
                    type: string
                  status:
                    enum:
                    - Unknown
                    - Available
                    - Degraded
                    - Unavailable
                    type: string
                required:
