server {
    listen       8080;
    server_name  _;

    # Serve static files
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/alerts to the alert-processor so the browser avoids CORS.
    # ALERT_PROCESSOR_HOST is resolved via Kubernetes DNS within the same namespace.
    location /api/alerts {
        proxy_pass         http://alert-processor:8080/alerts;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
